<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>案件管理 | 請求書作成アプリ</title>
<link rel="stylesheet" href="css/app.css">
</head>
<body>
<header class="app-header">
  <h1>請求書作成アプリ</h1>
  <nav class="app-nav">
    <a href="index.html">ホーム</a>
    <a href="companies.html">自社情報</a>
    <a href="clients.html">取引先</a>
    <a href="cases.html" class="active">案件</a>
    <a href="shifts.html">シフト入力</a>
    <a href="invoices.html">請求書</a>
  </nav>
</header>

<main class="app-main">
  <h2>案件</h2>
  <p class="hint">取引先ごとの案件と単価(日給)を登録します。シフトはこの案件に紐づけて記録します。</p>
  <div id="errorBanner" class="error-banner"></div>

  <section class="panel">
    <h3 id="formTitle">新規登録</h3>
    <form id="caseForm">
      <input type="hidden" id="id">
      <div class="form-grid">
        <div class="field">
          <label>取引先 *</label>
          <select id="client_id" required></select>
        </div>
        <div class="field">
          <label>案件名 *</label>
          <input type="text" id="name" required>
        </div>
        <div class="field">
          <label>単価(円) *</label>
          <input type="number" id="unit_price" step="1" min="0" required>
        </div>
        <div class="field">
          <label>単位</label>
          <input type="text" id="unit_label" value="日">
        </div>
        <div class="field">
          <label>税率</label>
          <select id="tax_rate">
            <option value="10">10%</option>
            <option value="8">8%（軽減）</option>
            <option value="0">対象外</option>
          </select>
        </div>
        <div class="field">
          <label>状態</label>
          <select id="active">
            <option value="1">稼働中</option>
            <option value="0">終了</option>
          </select>
        </div>
        <div class="field span-2">
          <label>備考</label>
          <textarea id="notes"></textarea>
        </div>
      </div>
      <div class="toolbar-row" style="margin-top: 12px;">
        <div>
          <button type="submit" class="primary">保存</button>
          <button type="button" id="cancelEdit" style="display:none;">編集をキャンセル</button>
        </div>
      </div>
    </form>
  </section>

  <section class="panel">
    <table class="data-table">
      <thead>
        <tr>
          <th>取引先</th>
          <th>案件名</th>
          <th>単価</th>
          <th>状態</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </section>
</main>

<script src="js/api.js"></script>
<script src="js/cases.js"></script>
</body>
</html>
