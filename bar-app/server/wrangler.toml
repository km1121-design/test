# Cloudflare Workers + D1 デプロイ設定（本番）。
# ローカル開発は better-sqlite3（npm run dev）で行うため、これはデプロイ時のみ使用する。
#
# 事前準備:
#   1. npm i -g wrangler && wrangler login
#   2. wrangler d1 create bar-app         # 出力の database_id を下に貼る
#   3. wrangler d1 execute bar-app --remote --file=src/db/schema.sql   # スキーマ適用
#   4. （初期データ）src/db/seed の内容を SQL 化するか、管理画面から投入
#   5. wrangler deploy
name = "bar-app-api"
main = "src/index.workers.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "bar-app"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

# 日次のCron。CronはUTC指定（JST = UTC+9）。
#   "0 10 * * *" = 19:00 JST → ③未提出リマインド（締め時刻）
#   "0 13 * * *" = 22:00 JST → ②日次サマリー＋⑤スタッフ日報まとめ＋④異常アラート
# scheduled() ハンドラ（src/index.workers.ts）が event.cron で分岐する。
[triggers]
crons = ["0 10 * * *", "0 13 * * *"]

# 本番のシークレットは wrangler secret put で設定する（wrangler.toml には書かない）:
#   wrangler secret put LINE_CHANNEL_ACCESS_TOKEN
#   wrangler secret put GOOGLE_SERVICE_ACCOUNT_KEY
#   wrangler secret put GDRIVE_ROOT_FOLDER_ID
#   wrangler secret put CRON_SECRET   # 外部cronから /api/cron/daily を叩く場合のみ
